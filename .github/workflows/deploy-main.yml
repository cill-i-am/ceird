name: Deploy Main

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build
    branches:
      - main
    types:
      - completed

concurrency:
  group: ceird-main-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  CEIRD_API_HOSTNAME: api.ceird.app
  CEIRD_AGENT_HOSTNAME: agent.ceird.app
  CEIRD_APP_HOSTNAME: app.ceird.app
  CEIRD_CLOUDFLARE: "1"
  CEIRD_MCP_HOSTNAME: mcp.ceird.app
  CEIRD_ZONE_NAME: ceird.app
  PNPM_CONFIG_OPTIONAL: "true"

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Type check app
        run: pnpm --filter app check-types

      - name: Type check domain core
        run: pnpm --filter @ceird/domain-core check-types

      - name: Type check API
        run: pnpm --filter api check-types

      - name: Type check domain
        run: pnpm --filter domain check-types

      - name: Type check MCP
        run: pnpm --filter mcp check-types

      - name: Type check infra
        run: pnpm run check-types:infra

      - name: Test domain core
        run: pnpm --filter @ceird/domain-core test

      - name: Test API adapter boundary
        run: pnpm --filter api test -- src/domain-adapter-boundaries.test.ts src/server.test.ts src/worker.test.ts

      - name: Test domain boundary
        run: pnpm --filter domain test -- src/domains/domain-boundaries.test.ts src/platform/cloudflare/env.test.ts src/worker.test.ts

      - name: Test MCP adapter boundary
        run: pnpm --filter mcp test

      - name: Test infrastructure contracts
        run: pnpm run test:infra

      - name: Test repository workflow contracts
        run: pnpm run test:scripts

      - name: Bootstrap Alchemy state store
        run: pnpm alchemy cloudflare bootstrap
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        run: pnpm alchemy deploy --stage main --yes
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}
