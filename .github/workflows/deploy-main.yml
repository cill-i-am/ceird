name: Deploy Main

on:
  workflow_dispatch:
    inputs:
      validate_only:
        description: Verify the selected SHA passed Build without deploying.
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows:
      - Build
    branches:
      - main
    types:
      - completed

concurrency:
  group: ceird-main-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  CEIRD_API_HOSTNAME: api.ceird.app
  CEIRD_AGENT_HOSTNAME: agent.ceird.app
  CEIRD_APP_HOSTNAME: app.ceird.app
  CEIRD_CLOUDFLARE: "1"
  CEIRD_MCP_HOSTNAME: mcp.ceird.app
  CEIRD_SYNC_HOSTNAME: sync.ceird.app
  CEIRD_ZONE_NAME: ceird.app
  PNPM_CONFIG_OPTIONAL: "true"

jobs:
  manual-build-gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Verify selected SHA passed Build
        env:
          DEPLOY_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          runs_json="$(gh api --method GET \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/build.yml/runs?head_sha=${DEPLOY_SHA}&event=push&branch=main&per_page=10")"

          matching_runs="$(
            jq --arg deploy_sha "$DEPLOY_SHA" '
              [
                .workflow_runs[]
                | select(.head_sha == $deploy_sha)
                | select(.event == "push")
                | select(.head_branch == "main")
              ]
            ' <<<"$runs_json"
          )"

          run_count="$(jq "length" <<<"$matching_runs")"
          if [[ "$run_count" -eq 0 ]]; then
            echo "No Build workflow run was found for main commit ${DEPLOY_SHA}."
            echo "Manual production deploys require a completed successful Build run for the exact selected SHA."
            exit 1
          fi

          latest_run="$(
            jq '
              sort_by(.created_at, .run_number, .run_attempt)
              | reverse
              | .[0]
            ' <<<"$matching_runs"
          )"

          run_id="$(jq -r ".id" <<<"$latest_run")"
          run_sha="$(jq -r ".head_sha" <<<"$latest_run")"
          run_status="$(jq -r ".status" <<<"$latest_run")"
          run_conclusion="$(jq -r ".conclusion // \"\"" <<<"$latest_run")"
          run_url="$(jq -r ".html_url" <<<"$latest_run")"

          echo "Latest matching Build run: ${run_url}"
          echo "Build run id: ${run_id}"
          echo "Build run SHA: ${run_sha}"
          echo "Build run status: ${run_status}"
          echo "Build run conclusion: ${run_conclusion:-none}"

          if [[ "$run_sha" != "$DEPLOY_SHA" ]]; then
            echo "Build run SHA does not match selected deploy SHA ${DEPLOY_SHA}."
            exit 1
          fi

          if [[ "$run_status" != "completed" || "$run_conclusion" != "success" ]]; then
            echo "Build run for ${DEPLOY_SHA} is not completed successfully."
            echo "Failing closed before entering the production deploy job."
            exit 1
          fi

          echo "Selected SHA ${DEPLOY_SHA} passed Build on main."

  deploy:
    needs:
      - manual-build-gate
    if: >
      always() &&
      (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.validate_only != true && needs.manual-build-gate.result == 'success')
      )
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Build
        run: pnpm build

      - name: Restore Alchemy state store credentials
        run: node scripts/restore-alchemy-state-store-credentials.mjs
        env:
          ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS: ${{ secrets.ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS }}

      - name: Deploy
        run: pnpm alchemy deploy --stage main --yes
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Audit main Alchemy state
        run: pnpm alchemy:state-audit --stage main --json --tenant-routing-required --allow-finding legacy_drizzle_migrations_state
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}
