name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CEIRD_CLOUDFLARE: "1"
  CEIRD_ZONE_NAME: ceird.app
  PNPM_CONFIG_OPTIONAL: "true"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format Check
        run: pnpm format

  check-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type Check
        run: pnpm check-types

  knip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Knip
        run: pnpm knip

  react-doctor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect app React changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            react_app:
              - 'apps/app/**/*.{js,jsx,ts,tsx}'
              - 'apps/app/package.json'
              - 'apps/app/react-doctor.config.json'
              - 'pnpm-lock.yaml'

      - name: Setup pnpm
        if: steps.changes.outputs.react_app == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: steps.changes.outputs.react_app == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        if: steps.changes.outputs.react_app == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        if: steps.changes.outputs.react_app == 'true'
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Run React Doctor
        if: steps.changes.outputs.react_app == 'true'
        run: pnpm --filter app react-doctor

  tests:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            command: pnpm --filter agent test
          - name: api
            command: pnpm --filter api test
          - name: app
            command: pnpm --filter app test
          - name: domain
            command: pnpm --filter domain test
          - name: mcp
            command: pnpm --filter mcp test
          - name: agents-core
            command: pnpm --filter @ceird/agents-core test
          - name: comments-core
            command: pnpm --filter @ceird/comments-core test
          - name: domain-core
            command: pnpm --filter @ceird/domain-core test
          - name: identity-core
            command: pnpm --filter @ceird/identity-core test
          - name: jobs-core
            command: pnpm --filter @ceird/jobs-core test
          - name: labels-core
            command: pnpm --filter @ceird/labels-core test
          - name: sites-core
            command: pnpm --filter @ceird/sites-core test
          - name: infra
            command: pnpm run test:infra
          - name: scripts
            command: pnpm run test:scripts

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Run tests
        run: ${{ matrix.command }}

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - check-types
      - knip
      - react-doctor
      - tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Build
        run: pnpm build

  cloud-e2e-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy cloud E2E
    runs-on: ubuntu-latest
    # Reuse the existing non-production deploy environment for credentials.
    # CI_STAGE is intentionally ephemeral and destroyed after E2E finishes.
    environment: preview-deploy
    needs:
      - build
    env:
      AUTH_RATE_LIMIT_ENABLED: "false"
      CEIRD_AGENT_HOSTNAME: agent-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_API_HOSTNAME: api-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_APP_HOSTNAME: app-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_MCP_HOSTNAME: mcp-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CI_STAGE: ci-${{ github.run_number }}-${{ github.run_attempt }}
      PLAYWRIGHT_AGENT_URL: https://agent-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      PLAYWRIGHT_API_URL: https://api-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      PLAYWRIGHT_BASE_URL: https://app-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      PLAYWRIGHT_TENANT_URL: https://ci-tenant-health--ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Validate CI stage
        run: |
          set -euo pipefail
          if [[ ! "$CI_STAGE" =~ ^ci-[0-9]+-[0-9]+$ ]]; then
            echo "Refusing to deploy unexpected CI stage: $CI_STAGE"
            exit 1
          fi

      - name: Restore Alchemy state store credentials
        run: node scripts/restore-alchemy-state-store-credentials.mjs
        env:
          ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS: ${{ secrets.ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS }}

      - name: Deploy cloud E2E
        run: pnpm alchemy deploy --stage "$CI_STAGE" --yes
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Audit CI Alchemy state
        run: pnpm alchemy:state-audit --stage "$CI_STAGE" --json --tenant-routing-required --allow-finding legacy_drizzle_migrations_state
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Wait for CI deploy health
        run: |
          set -euo pipefail

          wait_for_health() {
            local url="$1"
            local label="$2"

            for attempt in {1..120}; do
              if curl --fail --silent --show-error --max-time 10 "$url" >/dev/null; then
                echo "$label is healthy"
                return 0
              fi

              if [[ "$attempt" == "120" ]]; then
                echo "$label did not become healthy at $url"
                return 1
              fi

              echo "$label health check attempt $attempt failed; waiting for CI deploy route and TLS propagation"
              sleep 5
            done
          }

          wait_for_auth_domain_forwarding() {
            local label="API authenticated domain forwarding"

            for attempt in {1..120}; do
              local suffix
              local cookie_jar
              local signup_payload
              local organization_payload

              suffix="$(date +%s)-$RANDOM-$attempt"
              cookie_jar="$(mktemp)"
              signup_payload=$(printf '{"email":"ci-health-%s@example.com","password":"password123","name":"CI Health","callbackURL":"%s/verify-email?status=success"}' "$suffix" "$PLAYWRIGHT_BASE_URL")
              organization_payload=$(printf '{"name":"CI Health %s","slug":"ci-health-%s"}' "$suffix" "$suffix")

              if curl --fail --silent --show-error --max-time 10 \
                -c "$cookie_jar" \
                -H "origin: $PLAYWRIGHT_BASE_URL" \
                -H "content-type: application/json" \
                --data "$signup_payload" \
                "$PLAYWRIGHT_API_URL/api/auth/sign-up/email" >/dev/null \
                && curl --fail --silent --show-error --max-time 10 \
                  -b "$cookie_jar" \
                  -H "origin: $PLAYWRIGHT_BASE_URL" \
                  -H "accept: application/json" \
                  "$PLAYWRIGHT_API_URL/api/auth/get-session" >/dev/null \
                && curl --fail --silent --show-error --max-time 10 \
                  -b "$cookie_jar" \
                  -H "origin: $PLAYWRIGHT_BASE_URL" \
                  -H "content-type: application/json" \
                  --data "$organization_payload" \
                  "$PLAYWRIGHT_API_URL/api/auth/organization/create" >/dev/null; then
                rm -f "$cookie_jar"
                echo "$label is healthy"
                return 0
              fi

              rm -f "$cookie_jar"

              if [[ "$attempt" == "120" ]]; then
                echo "$label did not become healthy"
                return 1
              fi

              echo "$label check attempt $attempt failed; waiting for service binding propagation"
              sleep 5
            done
          }

          wait_for_app_authenticated_navigation() {
            local label="App authenticated navigation"

            for attempt in {1..120}; do
              local suffix
              local cookie_jar
              local signup_payload
              local headers_file

              suffix="$(date +%s)-$RANDOM-$attempt"
              cookie_jar="$(mktemp)"
              headers_file="$(mktemp)"
              signup_payload=$(printf '{"email":"ci-app-health-%s@example.com","password":"password123","name":"CI App Health","callbackURL":"%s/verify-email?status=success"}' "$suffix" "$PLAYWRIGHT_BASE_URL")

              if curl --fail --silent --show-error --max-time 10 \
                -c "$cookie_jar" \
                -H "origin: $PLAYWRIGHT_BASE_URL" \
                -H "content-type: application/json" \
                --data "$signup_payload" \
                "$PLAYWRIGHT_API_URL/api/auth/sign-up/email" >/dev/null \
                && curl --silent --show-error --max-time 10 \
                  -b "$cookie_jar" \
                  -D "$headers_file" \
                  -o /dev/null \
                  "$PLAYWRIGHT_BASE_URL/" \
                && grep -qi '^location: /create-organization' "$headers_file"; then
                rm -f "$cookie_jar" "$headers_file"
                echo "$label is healthy"
                return 0
              fi

              rm -f "$cookie_jar" "$headers_file"

              if [[ "$attempt" == "120" ]]; then
                echo "$label did not become healthy"
                return 1
              fi

              echo "$label check attempt $attempt failed; waiting for app/auth propagation"
              sleep 5
            done
          }

          wait_for_health "$PLAYWRIGHT_API_URL/health" "API"
          wait_for_health "$PLAYWRIGHT_API_URL/api/auth/get-session" "API domain forwarding"
          wait_for_auth_domain_forwarding
          wait_for_health "$PLAYWRIGHT_AGENT_URL/health" "Agent"
          wait_for_health "$PLAYWRIGHT_BASE_URL/health" "App"
          wait_for_health "$PLAYWRIGHT_TENANT_URL/health" "Tenant app"
          wait_for_app_authenticated_navigation

  cloud-e2e:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Cloud E2E shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    environment: preview-deploy
    needs:
      - cloud-e2e-deploy
    strategy:
      fail-fast: false
      matrix:
        shard:
          - 1/3
          - 2/3
          - 3/3
    env:
      AUTH_RATE_LIMIT_ENABLED: "false"
      CEIRD_AGENT_HOSTNAME: agent-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_API_HOSTNAME: api-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_APP_HOSTNAME: app-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_MCP_HOSTNAME: mcp-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CI_STAGE: ci-${{ github.run_number }}-${{ github.run_attempt }}
      PLAYWRIGHT_AGENT_URL: https://agent-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      PLAYWRIGHT_API_URL: https://api-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      PLAYWRIGHT_BASE_URL: https://app-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      PLAYWRIGHT_TENANT_URL: https://ci-tenant-health--ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Validate CI stage
        run: |
          set -euo pipefail
          if [[ ! "$CI_STAGE" =~ ^ci-[0-9]+-[0-9]+$ ]]; then
            echo "Refusing to test unexpected CI stage: $CI_STAGE"
            exit 1
          fi

      - name: Restore Alchemy state store credentials
        run: node scripts/restore-alchemy-state-store-credentials.mjs
        env:
          ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS: ${{ secrets.ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS }}

      - name: Export Playwright database URL
        run: |
          set -euo pipefail
          pnpm --silent alchemy state get ceird "$CI_STAGE" PostgresBranch --stage "$CI_STAGE" \
            | node scripts/export-playwright-database-url.mjs
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Run E2E tests
        run: pnpm --filter app e2e --shard=${{ matrix.shard }}

  cloud-e2e-destroy:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs['cloud-e2e-deploy'].result != 'skipped'
    name: Destroy cloud E2E
    runs-on: ubuntu-latest
    environment: preview-deploy
    needs:
      - cloud-e2e-deploy
      - cloud-e2e
    env:
      AUTH_RATE_LIMIT_ENABLED: "false"
      CEIRD_AGENT_HOSTNAME: agent-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_API_HOSTNAME: api-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_APP_HOSTNAME: app-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CEIRD_MCP_HOSTNAME: mcp-ci-${{ github.run_number }}-${{ github.run_attempt }}.ceird.app
      CI_STAGE: ci-${{ github.run_number }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Validate CI stage
        run: |
          set -euo pipefail
          if [[ ! "$CI_STAGE" =~ ^ci-[0-9]+-[0-9]+$ ]]; then
            echo "Refusing to destroy unexpected CI stage: $CI_STAGE"
            exit 1
          fi

      - name: Restore Alchemy state store credentials
        run: node scripts/restore-alchemy-state-store-credentials.mjs
        env:
          ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS: ${{ secrets.ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS }}

      - name: Destroy cloud E2E
        run: pnpm alchemy destroy --stage "$CI_STAGE" --yes
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}
