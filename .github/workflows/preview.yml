name: Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number whose preview stage should be destroyed
        required: true
        type: string

concurrency:
  group: ceird-preview-pr-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  CEIRD_CLOUDFLARE: "1"
  CEIRD_ZONE_NAME: ceird.app
  PNPM_CONFIG_OPTIONAL: "true"
  PREVIEW_STAGE: pr-${{ github.event.pull_request.number || inputs.pr_number }}

jobs:
  deploy-e2e:
    name: Deploy Preview And E2E
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: preview-deploy
    env:
      PLAYWRIGHT_AGENT_URL: https://agent.pr-${{ github.event.pull_request.number }}.ceird.app
      PLAYWRIGHT_API_URL: https://api.pr-${{ github.event.pull_request.number }}.ceird.app
      PLAYWRIGHT_BASE_URL: https://app.pr-${{ github.event.pull_request.number }}.ceird.app
      PLAYWRIGHT_TENANT_URL: https://preview-tenant-health--pr-${{ github.event.pull_request.number }}.ceird.app

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Restore Alchemy state store credentials
        run: node scripts/restore-alchemy-state-store-credentials.mjs
        env:
          ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS: ${{ secrets.ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS }}

      - name: Deploy preview
        run: pnpm alchemy deploy --stage "$PREVIEW_STAGE" --yes
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Audit preview Alchemy state
        run: pnpm alchemy:state-audit -- --stage "$PREVIEW_STAGE" --json --tenant-routing-required --allow-finding legacy_drizzle_migrations_state
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Export Playwright database URL
        run: |
          set -euo pipefail
          pnpm --silent alchemy state get ceird "$PREVIEW_STAGE" PostgresBranch --stage "$PREVIEW_STAGE" \
            | node scripts/export-playwright-database-url.mjs
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Wait for preview health
        run: |
          set -euo pipefail

          wait_for_health() {
            local url="$1"
            local label="$2"

            for attempt in {1..120}; do
              if curl --fail --silent --show-error --max-time 10 "$url" >/dev/null; then
                echo "$label is healthy"
                return 0
              fi

              if [[ "$attempt" == "120" ]]; then
                echo "$label did not become healthy at $url"
                return 1
              fi

              echo "$label health check attempt $attempt failed; waiting for preview route and TLS propagation"
              sleep 5
            done
          }

          wait_for_auth_domain_forwarding() {
            local label="API authenticated domain forwarding"

            for attempt in {1..120}; do
              local suffix
              local cookie_jar
              local signup_payload
              local organization_payload

              suffix="$(date +%s)-$RANDOM-$attempt"
              cookie_jar="$(mktemp)"
              signup_payload=$(printf '{"email":"preview-health-%s@example.com","password":"password123","name":"Preview Health","callbackURL":"%s/verify-email?status=success"}' "$suffix" "$PLAYWRIGHT_BASE_URL")
              organization_payload=$(printf '{"name":"Preview Health %s","slug":"preview-health-%s"}' "$suffix" "$suffix")

              if curl --fail --silent --show-error --max-time 10 \
                -c "$cookie_jar" \
                -H "origin: $PLAYWRIGHT_BASE_URL" \
                -H "content-type: application/json" \
                --data "$signup_payload" \
                "$PLAYWRIGHT_API_URL/api/auth/sign-up/email" >/dev/null \
                && curl --fail --silent --show-error --max-time 10 \
                  -b "$cookie_jar" \
                  -H "origin: $PLAYWRIGHT_BASE_URL" \
                  -H "accept: application/json" \
                  "$PLAYWRIGHT_API_URL/api/auth/get-session" >/dev/null \
                && curl --fail --silent --show-error --max-time 10 \
                  -b "$cookie_jar" \
                  -H "origin: $PLAYWRIGHT_BASE_URL" \
                  -H "content-type: application/json" \
                  --data "$organization_payload" \
                  "$PLAYWRIGHT_API_URL/api/auth/organization/create" >/dev/null; then
                rm -f "$cookie_jar"
                echo "$label is healthy"
                return 0
              fi

              rm -f "$cookie_jar"

              if [[ "$attempt" == "120" ]]; then
                echo "$label did not become healthy"
                return 1
              fi

              echo "$label check attempt $attempt failed; waiting for service binding propagation"
              sleep 5
            done
          }

          wait_for_app_authenticated_navigation() {
            local label="App authenticated navigation"

            for attempt in {1..120}; do
              local suffix
              local cookie_jar
              local signup_payload
              local headers_file

              suffix="$(date +%s)-$RANDOM-$attempt"
              cookie_jar="$(mktemp)"
              headers_file="$(mktemp)"
              signup_payload=$(printf '{"email":"preview-app-health-%s@example.com","password":"password123","name":"Preview App Health","callbackURL":"%s/verify-email?status=success"}' "$suffix" "$PLAYWRIGHT_BASE_URL")

              if curl --fail --silent --show-error --max-time 10 \
                -c "$cookie_jar" \
                -H "origin: $PLAYWRIGHT_BASE_URL" \
                -H "content-type: application/json" \
                --data "$signup_payload" \
                "$PLAYWRIGHT_API_URL/api/auth/sign-up/email" >/dev/null \
                && curl --silent --show-error --max-time 10 \
                  -b "$cookie_jar" \
                  -D "$headers_file" \
                  -o /dev/null \
                  "$PLAYWRIGHT_BASE_URL/" \
                && grep -qi '^location: /create-organization' "$headers_file"; then
                rm -f "$cookie_jar" "$headers_file"
                echo "$label is healthy"
                return 0
              fi

              rm -f "$cookie_jar" "$headers_file"

              if [[ "$attempt" == "120" ]]; then
                echo "$label did not become healthy"
                return 1
              fi

              echo "$label check attempt $attempt failed; waiting for app/auth propagation"
              sleep 5
            done
          }

          wait_for_health "$PLAYWRIGHT_API_URL/health" "API"
          wait_for_health "$PLAYWRIGHT_API_URL/api/auth/get-session" "API domain forwarding"
          wait_for_auth_domain_forwarding
          wait_for_health "$PLAYWRIGHT_AGENT_URL/health" "Agent"
          wait_for_health "$PLAYWRIGHT_BASE_URL/health" "App"
          wait_for_health "$PLAYWRIGHT_TENANT_URL/health" "Tenant app"
          wait_for_app_authenticated_navigation

      - name: Comment preview URLs
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- ceird-preview-environment -->";
            const agentUrl = process.env.PLAYWRIGHT_AGENT_URL;
            const appUrl = process.env.PLAYWRIGHT_BASE_URL;
            const apiUrl = process.env.PLAYWRIGHT_API_URL;
            const stage = process.env.PREVIEW_STAGE;
            const headSha = context.payload.pull_request.head.sha;
            const pullRequestNumber = context.payload.pull_request.number;
            const body = [
              marker,
              "### Preview environment is ready",
              "",
              "| Surface | URL |",
              "| --- | --- |",
              `| App | [${appUrl}](${appUrl}) |`,
              `| API | [${apiUrl}](${apiUrl}) |`,
              `| Agent | [${agentUrl}](${agentUrl}) |`,
              "",
              `- Tenant example: \`https://<org-slug>--pr-${pullRequestNumber}.ceird.app\``,
              "",
              `Stage: \`${stage}\``,
              `Commit: \`${headSha.slice(0, 7)}\``,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existingComment = comments.find(
              (comment) =>
                comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Run E2E tests
        run: pnpm --filter app e2e

  cleanup:
    name: Destroy Preview
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: preview-cleanup

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Validate preview stage
        run: |
          set -euo pipefail
          if [[ ! "$PREVIEW_STAGE" =~ ^pr-[0-9]+$ ]]; then
            echo "Refusing to destroy unexpected preview stage: $PREVIEW_STAGE"
            exit 1
          fi

      - name: Restore Alchemy state store credentials
        run: node scripts/restore-alchemy-state-store-credentials.mjs
        env:
          ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS: ${{ secrets.ALCHEMY_CLOUDFLARE_STATE_STORE_CREDENTIALS }}

      - name: Destroy preview
        run: pnpm alchemy destroy --stage "$PREVIEW_STAGE" --yes
        env:
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_FROM_NAME: ${{ vars.AUTH_EMAIL_FROM_NAME || 'Ceird' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID }}

      - name: Delete preview tenant route fallback
        if: always()
        run: |
          set -euo pipefail

          node <<'NODE'
          const stage = process.env.PREVIEW_STAGE;
          const zoneName = process.env.CEIRD_ZONE_NAME;
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const apiToken = process.env.CLOUDFLARE_API_TOKEN;

          if (!/^pr-[0-9]+$/.test(stage ?? "")) {
            throw new Error(`Refusing to delete tenant route for unexpected preview stage: ${stage}`);
          }
          if (!zoneName) {
            throw new Error("CEIRD_ZONE_NAME is required for preview tenant route cleanup");
          }
          if (!accountId) {
            throw new Error("CLOUDFLARE_ACCOUNT_ID is required for preview tenant route cleanup");
          }
          if (!apiToken) {
            throw new Error("CLOUDFLARE_API_TOKEN is required for preview tenant route cleanup");
          }

          const apiBaseUrl = "https://api.cloudflare.com/client/v4";
          const routePattern = `*--${stage}.${zoneName}/*`;

          async function cloudflare(path, init = {}) {
            const response = await fetch(`${apiBaseUrl}${path}`, {
              ...init,
              headers: {
                authorization: `Bearer ${apiToken}`,
                "content-type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const body = await response.json().catch(() => null);

            if (!response.ok || body?.success !== true) {
              const details = body?.errors
                ?.map((error) => error.message)
                .filter(Boolean)
                .join(", ");
              throw new Error(
                `Cloudflare ${init.method ?? "GET"} ${path} failed with ${response.status}${details ? `: ${details}` : ""}`
              );
            }

            return body;
          }

          const zones = await cloudflare(
            `/zones?account.id=${encodeURIComponent(accountId)}&name=${encodeURIComponent(zoneName)}&per_page=1`
          );
          const zoneId = zones.result?.find((zone) => zone.name === zoneName)?.id;

          if (!zoneId) {
            throw new Error(`Cloudflare zone not found: ${zoneName}`);
          }

          for (let page = 1; ; page += 1) {
            const routes = await cloudflare(
              `/zones/${zoneId}/workers/routes?page=${page}&per_page=100`
            );
            const route = routes.result?.find(
              (candidate) => candidate.pattern === routePattern
            );

            if (route) {
              await cloudflare(`/zones/${zoneId}/workers/routes/${route.id}`, {
                method: "DELETE",
              });
              console.log(`Deleted preview tenant route ${routePattern}`);
              break;
            }

            const totalPages = routes.result_info?.total_pages;
            const hasNextPage =
              typeof totalPages === "number"
                ? page < totalPages
                : (routes.result?.length ?? 0) >= 100;

            if (!hasNextPage) {
              console.log(`No preview tenant route found for ${routePattern}`);
              break;
            }
          }
          NODE
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
