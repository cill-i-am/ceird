packages:
  - "apps/*"
  - "packages/*"

autoInstallPeers: false

onlyBuiltDependencies:
  - esbuild
  - lefthook
  - lightningcss

packageExtensions:
  drizzle-kit@>=1.0.0-rc.1:
    dependencies:
      drizzle-orm: ^1.0.0-rc.1

peerDependencyRules:
  allowedVersions:
    drizzle-orm: 1.0.0-rc.3-e9dfa4b

supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
  libc:
    - current
    - glibc

patchedDependencies:
  ajv@8.20.0: patches/ajv@8.20.0.patch
  ajv-formats@3.0.1: patches/ajv-formats@3.0.1.patch
  agents@0.15.0: patches/agents@0.15.0.patch
  workers-ai-provider@3.1.14: patches/workers-ai-provider@3.1.14.patch
